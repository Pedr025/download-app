<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo - Sites Lucrativos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <!-- Firebase SDKs (Versão Compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-storage-compat.js"></script>

    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background-color: #0a0e27; color: #ffffff; }
        .nike-bold { font-weight: 900; text-transform: uppercase; letter-spacing: -0.05em; }
        .gradient-text { background: linear-gradient(135deg, #00d4ff, #0099ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .btn-primary { background: linear-gradient(135deg, #00d4ff, #0099ff); color: #0a0e27; font-weight: 700; border: none; border-radius: 8px; padding: 12px 32px; cursor: pointer; transition: all 0.3s ease; }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-secondary { background: transparent; color: #00d4ff; font-weight: 700; border: 2px solid #00d4ff; border-radius: 8px; padding: 10px 28px; cursor: pointer; transition: all 0.3s ease; }
        .btn-danger { background: linear-gradient(135deg, #ff006e, #ff4757); color: white; font-weight: 700; border: none; border-radius: 8px; padding: 10px 20px; cursor: pointer; }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 600; color: #e2e8f0; }
        .form-group input, .form-group textarea { width: 100%; padding: 12px; background: #1a1f3a; border: 1px solid rgba(0, 212, 255, 0.2); border-radius: 8px; color: #ffffff; }
        .product-card { background: linear-gradient(135deg, #1a1f3a 0%, #16213e 100%); border: 1px solid rgba(0, 212, 255, 0.2); border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.8); align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { background: #0a0e27; padding: 2rem; border-radius: 12px; border: 1px solid rgba(0, 212, 255, 0.2); max-width: 600px; width: 90%; max-height: 90vh; overflow-y: auto; }
        .image-preview { width: 100%; height: 150px; background: #1a1f3a; border: 2px dashed rgba(0, 212, 255, 0.3); border-radius: 8px; display: flex; align-items: center; justify-content: center; margin-bottom: 1rem; overflow: hidden; }
        .image-preview img { width: 100%; height: 100%; object-fit: cover; }
        .loading-overlay { display: none; position: fixed; inset: 0; background: rgba(10, 14, 39, 0.8); z-index: 2000; align-items: center; justify-content: center; flex-direction: column; }
        .loading-overlay.active { display: flex; }
        .spinner { border: 4px solid rgba(0, 212, 255, 0.2); border-top: 4px solid #00d4ff; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .alert { padding: 1rem; border-radius: 8px; margin-bottom: 1.5rem; display: none; position: fixed; top: 20px; right: 20px; z-index: 3000; min-width: 300px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .alert.active { display: block; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
        .alert-success { background: #065f46; border: 1px solid #059669; color: #ecfdf5; }
        .alert-error { background: #991b1b; border: 1px solid #dc2626; color: #fef2f2; }
    </style>
</head>
<body>

    <div id="loadingOverlay" class="loading-overlay">
        <div class="spinner"></div>
        <p class="mt-4 font-bold text-[#00d4ff]">Processando...</p>
    </div>

    <div id="alert" class="alert"></div>

    <nav class="fixed top-0 w-full bg-[#0a0e27] bg-opacity-95 backdrop-blur-md z-50 border-b border-[rgba(0,212,255,0.1)]">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <div class="w-10 h-10 bg-gradient-to-br from-cyan-400 to-blue-600 rounded-lg flex items-center justify-center">
                    <span class="text-white font-black text-lg">SL</span>
                </div>
                <span class="text-xl font-black gradient-text">Painel Admin</span>
            </div>
            <a href="index.html" class="px-4 py-2 hover:bg-[rgba(0,212,255,0.1)] rounded-lg transition">Voltar ao Site</a>
        </div>
    </nav>

    <main class="pt-24 pb-20">
        <div class="max-w-7xl mx-auto px-6">
            <div class="flex justify-between items-center mb-8">
                <div>
                    <h1 class="text-4xl nike-bold mb-2">Gerenciar Produtos</h1>
                    <p class="text-gray-400">Controle total do seu catálogo via Firebase</p>
                </div>
                <button onclick="openAddProductModal()" class="btn-primary text-lg px-8 py-4">+ Novo Produto</button>
            </div>
            <div id="products-container" class="grid grid-cols-1 gap-4">
                <p class="text-center py-20 text-gray-500">Carregando produtos...</p>
            </div>
        </div>
    </main>

    <!-- Modal -->
    <div id="productModal" class="modal">
        <div class="modal-content">
            <div class="flex justify-between items-center mb-6">
                <h2 id="modalTitle" class="text-2xl font-bold">Novo Produto</h2>
                <button onclick="closeProductModal()" class="text-3xl hover:text-red-500">&times;</button>
            </div>
            <form id="productForm">
                <div class="form-group">
                    <label>Título do Produto *</label>
                    <input type="text" id="productTitle" required placeholder="Ex: Site de Apostas">
                </div>
                <div class="form-group">
                    <label>Descrição *</label>
                    <textarea id="productDescription" required class="min-h-[100px]" placeholder="Detalhes do produto..."></textarea>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="form-group">
                        <label>Preço (R$) *</label>
                        <input type="number" id="productPrice" step="0.01" required placeholder="0.00">
                    </div>
                    <div class="form-group">
                        <label>Avaliação (0-5) *</label>
                        <input type="number" id="productRating" min="0" max="5" step="0.1" required value="5.0">
                    </div>
                </div>
                <div class="form-group">
                    <label>Badge/Etiqueta *</label>
                    <input type="text" id="productBadge" required placeholder="Ex: Premium">
                </div>
                <div class="form-group">
                    <label>Imagem do Produto *</label>
                    <div class="image-preview" id="imagePreview">
                        <p class="text-gray-400">Nenhuma imagem selecionada</p>
                    </div>
                    <input type="file" id="productImage" accept="image/*" class="hidden">
                    <label for="productImage" class="block p-3 bg-[#1a1f3a] border border-[rgba(0,212,255,0.2)] rounded-lg text-center cursor-pointer text-[#00d4ff] font-bold hover:border-[#00d4ff]">Selecionar Imagem</label>
                    <input type="hidden" id="productImageUrl">
                </div>
                <div class="form-group flex items-center gap-2">
                    <input type="checkbox" id="productPromotion" class="w-5 h-5 accent-[#00d4ff]">
                    <label class="mb-0">Em promoção?</label>
                </div>
                <div class="form-group">
                    <label>Link de Pagamento *</label>
                    <input type="url" id="productPaymentLink" required placeholder="https://...">
                </div>
                <div class="flex gap-4 mt-8">
                    <button type="submit" id="saveBtn" class="btn-primary flex-1">Salvar Produto</button>
                    <button type="button" onclick="closeProductModal()" class="btn-secondary flex-1">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Configuração do Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyCpi9LmOel3NXEQNLd8y8zEZxVqZzBhCso",
            projectId: "riderprime-78955",
            databaseURL: "https://riderprime-78955-default-rtdb.firebaseio.com",
            storageBucket: "riderprime-78955.appspot.com"
        };

        // Inicialização Segura
        let db, storage;
        try {
            firebase.initializeApp(firebaseConfig);
            db = firebase.firestore();
            storage = firebase.storage();
            console.log("Firebase inicializado com sucesso.");
        } catch (e) {
            console.error("Erro ao inicializar Firebase:", e);
            alert("Erro crítico ao carregar o banco de dados.");
        }

        let currentEditingId = null;
        let selectedFile = null;

        // Elementos
        const modal = document.getElementById('productModal');
        const form = document.getElementById('productForm');
        const overlay = document.getElementById('loadingOverlay');
        const container = document.getElementById('products-container');

        // Funções de UI
        function showLoading(s) { overlay.classList.toggle('active', s); }
        
        function showAlert(msg, type) {
            const a = document.getElementById('alert');
            a.textContent = msg;
            a.className = `alert active alert-${type}`;
            setTimeout(() => a.classList.remove('active'), 4000);
        }

        window.openAddProductModal = () => {
            currentEditingId = null;
            form.reset();
            document.getElementById('modalTitle').textContent = 'Novo Produto';
            document.getElementById('imagePreview').innerHTML = '<p class="text-gray-400">Nenhuma imagem selecionada</p>';
            document.getElementById('productImageUrl').value = '';
            selectedFile = null;
            modal.classList.add('active');
        };

        window.closeProductModal = () => { modal.classList.remove('active'); };

        // Preview de Imagem
        document.getElementById('productImage').onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                selectedFile = file;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    document.getElementById('imagePreview').innerHTML = `<img src="${ev.target.result}">`;
                };
                reader.readAsDataURL(file);
            }
        };

        // Carregar Produtos
        async function loadProducts() {
            try {
                const snapshot = await db.collection('produtos').orderBy('createdAt', 'desc').get();
                container.innerHTML = '';
                if (snapshot.empty) {
                    container.innerHTML = '<p class="text-center py-10 text-gray-500">Nenhum produto cadastrado.</p>';
                    return;
                }
                snapshot.forEach(doc => {
                    const p = doc.data();
                    const card = document.createElement('div');
                    card.className = 'product-card flex flex-col md:flex-row gap-6 items-center';
                    card.innerHTML = `
                        <img src="${p.imageUrl || 'https://via.placeholder.com/150'}" class="w-32 h-32 object-cover rounded-xl border border-[rgba(0,212,255,0.2)]">
                        <div class="flex-1 text-center md:text-left">
                            <h3 class="text-xl font-bold">${p.title}</h3>
                            <p class="text-[#00d4ff] font-black text-lg">R$ ${parseFloat(p.price).toFixed(2)}</p>
                            <p class="text-gray-500 text-sm line-clamp-1">${p.description}</p>
                        </div>
                        <div class="flex gap-3">
                            <button onclick="editProduct('${doc.id}')" class="btn-secondary px-6 py-2">Editar</button>
                            <button onclick="deleteProduct('${doc.id}')" class="btn-danger px-6 py-2">Excluir</button>
                        </div>
                    `;
	                    container.appendChild(card);
                });
            } catch (e) {
                console.error("Erro ao carregar:", e);
                container.innerHTML = '<p class="text-red-500 text-center">Erro ao carregar produtos.</p>';
            }
        }

        // Salvar Produto
        form.onsubmit = async (e) => {
            e.preventDefault();
            showLoading(true);
            console.log("Iniciando processo de salvamento...");

            try {
                let url = document.getElementById('productImageUrl').value;
                
                // Upload se houver novo arquivo
                if (selectedFile) {
                    console.log("Fazendo upload da imagem...");
                    const fileRef = storage.ref(`produtos/${Date.now()}_${selectedFile.name}`);
                    const uploadTask = await fileRef.put(selectedFile);
                    url = await uploadTask.ref.getDownloadURL();
                    console.log("Upload concluído:", url);
                }

                const productData = {
                    title: document.getElementById('productTitle').value,
                    description: document.getElementById('productDescription').value,
                    price: parseFloat(document.getElementById('productPrice').value),
                    rating: parseFloat(document.getElementById('productRating').value),
                    badge: document.getElementById('productBadge').value,
                    promotion: document.getElementById('productPromotion').checked,
                    paymentLink: document.getElementById('productPaymentLink').value,
                    imageUrl: url,
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                };

                if (currentEditingId) {
                    console.log("Atualizando produto:", currentEditingId);
                    await db.collection('produtos').doc(currentEditingId).update(productData);
                } else {
                    console.log("Criando novo produto...");
                    productData.createdAt = firebase.firestore.FieldValue.serverTimestamp();
                    await db.collection('produtos').add(productData);
                }

                showAlert('Produto salvo com sucesso!', 'success');
                closeProductModal();
                loadProducts();
            } catch (err) {
                console.error("Erro detalhado ao salvar:", err);
                showAlert('Erro ao salvar: ' + err.message, 'error');
            } finally {
                showLoading(false);
            }
        };

        // Editar
        window.editProduct = async (id) => {
            showLoading(true);
            try {
                const doc = await db.collection('produtos').doc(id).get();
                const p = doc.data();
                currentEditingId = id;
                document.getElementById('modalTitle').textContent = 'Editar Produto';
                document.getElementById('productTitle').value = p.title;
                document.getElementById('productDescription').value = p.description;
                document.getElementById('productPrice').value = p.price;
                document.getElementById('productRating').value = p.rating;
                document.getElementById('productBadge').value = p.badge;
                document.getElementById('productPromotion').checked = p.promotion;
                document.getElementById('productPaymentLink').value = p.paymentLink;
                document.getElementById('productImageUrl').value = p.imageUrl || '';
                document.getElementById('imagePreview').innerHTML = p.imageUrl ? `<img src="${p.imageUrl}">` : '';
                modal.classList.add('active');
            } catch (e) {
                showAlert('Erro ao carregar dados.', 'error');
            }
            showLoading(false);
        };

        // Excluir
        window.deleteProduct = async (id) => {
            if (confirm('Tem certeza que deseja excluir este produto?')) {
                showLoading(true);
                try {
                    await db.collection('produtos').doc(id).delete();
                    showAlert('Excluído com sucesso.', 'success');
                    loadProducts();
                } catch (e) {
                    showAlert('Erro ao excluir.', 'error');
                }
                showLoading(false);
            }
        };

        // Iniciar
        loadProducts();
    </script>
</body>
</html>
