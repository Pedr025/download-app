<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo - Sites Lucrativos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <!-- Firebase SDKs (Versão Compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-storage-compat.js"></script>

    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background-color: #0a0e27; color: #ffffff; }
        .nike-bold { font-weight: 900; text-transform: uppercase; letter-spacing: -0.05em; }
        .gradient-text { background: linear-gradient(135deg, #00d4ff, #0099ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .btn-primary { background: linear-gradient(135deg, #00d4ff, #0099ff); color: #0a0e27; font-weight: 700; border: none; border-radius: 8px; padding: 12px 32px; cursor: pointer; transition: all 0.3s ease; }
        .btn-primary:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(0, 212, 255, 0.5); }
        .btn-secondary { background: transparent; color: #00d4ff; font-weight: 700; border: 2px solid #00d4ff; border-radius: 8px; padding: 10px 28px; cursor: pointer; transition: all 0.3s ease; }
        .btn-secondary:hover { background: #00d4ff; color: #0a0e27; }
        .btn-danger { background: linear-gradient(135deg, #ff006e, #ff4757); color: white; font-weight: 700; border: none; border-radius: 8px; padding: 10px 20px; cursor: pointer; transition: all 0.3s ease; }
        .btn-danger:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(255, 0, 110, 0.5); }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 600; color: #e2e8f0; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 12px; background: #1a1f3a; border: 1px solid rgba(0, 212, 255, 0.2); border-radius: 8px; color: #ffffff; font-size: 1rem; transition: all 0.3s ease; }
        .form-group input:focus, .form-group textarea:focus { outline: none; border-color: #00d4ff; box-shadow: 0 0 10px rgba(0, 212, 255, 0.3); }
        .product-card { background: linear-gradient(135deg, #1a1f3a 0%, #16213e 100%); border: 1px solid rgba(0, 212, 255, 0.2); border-radius: 12px; overflow: hidden; transition: all 0.3s ease; padding: 1.5rem; margin-bottom: 1.5rem; }
        .product-image { width: 100%; height: 150px; object-fit: cover; border-radius: 8px; }
        .badge { background: linear-gradient(135deg, #ff006e, #00d4ff); color: white; padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; text-transform: uppercase; display: inline-block; margin-bottom: 0.5rem; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.8); align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { background: #0a0e27; padding: 2rem; border-radius: 12px; border: 1px solid rgba(0, 212, 255, 0.2); max-width: 600px; width: 90%; max-height: 90vh; overflow-y: auto; }
        .image-preview { width: 100%; height: 200px; background: #1a1f3a; border: 2px dashed rgba(0, 212, 255, 0.3); border-radius: 8px; display: flex; align-items: center; justify-content: center; margin-bottom: 1rem; overflow: hidden; }
        .image-preview img { width: 100%; height: 100%; object-fit: cover; }
        .loading { display: none; text-align: center; padding: 2rem; }
        .loading.active { display: block; }
        .spinner { border: 4px solid rgba(0, 212, 255, 0.2); border-top: 4px solid #00d4ff; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 1rem; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .alert { padding: 1rem; border-radius: 8px; margin-bottom: 1.5rem; display: none; }
        .alert.active { display: block; }
        .alert-success { background: rgba(34, 197, 94, 0.2); border: 1px solid #22c55e; color: #86efac; }
        .alert-error { background: rgba(239, 68, 68, 0.2); border: 1px solid #ef4444; color: #fca5a5; }
    </style>
</head>
<body>

    <nav class="fixed top-0 w-full bg-[#0a0e27] bg-opacity-95 backdrop-blur-md z-50 border-b border-[rgba(0,212,255,0.1)]">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <div class="w-10 h-10 bg-gradient-to-br from-cyan-400 to-blue-600 rounded-lg flex items-center justify-center">
                    <span class="text-white font-black text-lg">SL</span>
                </div>
                <span class="text-xl font-black gradient-text">Painel Admin</span>
            </div>
            <div class="flex items-center space-x-4">
                <a href="index.html" class="px-4 py-2 hover:bg-[rgba(0,212,255,0.1)] rounded-lg transition">Voltar ao Site</a>
            </div>
        </div>
    </nav>

    <main class="pt-24 pb-20">
        <div class="max-w-7xl mx-auto px-6">
            <div id="alert" class="alert"></div>
            <div class="flex justify-between items-center mb-8">
                <div>
                    <h1 class="text-4xl nike-bold mb-2">Gerenciar Produtos</h1>
                    <p class="text-gray-400">Adicione, edite ou remova produtos do seu catálogo</p>
                </div>
                <button onclick="openAddProductModal()" class="btn-primary text-lg px-8 py-4">+ Novo Produto</button>
            </div>

            <div id="loading" class="loading">
                <div class="spinner"></div>
                <p>Carregando...</p>
            </div>

            <div id="products-container"></div>
        </div>
    </main>

    <div id="productModal" class="modal">
        <div class="modal-content">
            <div class="flex justify-between items-center mb-6">
                <h2 id="modalTitle" class="text-2xl font-bold">Novo Produto</h2>
                <button onclick="closeProductModal()" class="text-3xl">&times;</button>
            </div>
            <form id="productForm" onsubmit="saveProduct(event)">
                <div class="form-group">
                    <label>Título do Produto *</label>
                    <input type="text" id="productTitle" required>
                </div>
                <div class="form-group">
                    <label>Descrição *</label>
                    <textarea id="productDescription" required class="min-h-[100px]"></textarea>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="form-group">
                        <label>Preço (R$) *</label>
                        <input type="number" id="productPrice" step="0.01" required>
                    </div>
                    <div class="form-group">
                        <label>Avaliação (0-5) *</label>
                        <input type="number" id="productRating" min="0" max="5" step="0.1" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Badge/Etiqueta *</label>
                    <input type="text" id="productBadge" required placeholder="Ex: Premium">
                </div>
                <div class="form-group">
                    <label>Imagem do Produto *</label>
                    <div class="image-preview" id="imagePreview">
                        <p class="text-gray-400">Nenhuma imagem selecionada</p>
                    </div>
                    <input type="file" id="productImage" accept="image/*" onchange="previewImage(event)" class="hidden">
                    <label for="productImage" class="block p-3 bg-[#1a1f3a] border border-[rgba(0,212,255,0.2)] rounded-lg text-center cursor-pointer text-[#00d4ff] font-bold">Selecionar Imagem</label>
                    <input type="hidden" id="productImageUrl">
                </div>
                <div class="form-group flex items-center gap-2">
                    <input type="checkbox" id="productPromotion" class="w-5 h-5 accent-[#00d4ff]">
                    <label class="mb-0">Em promoção?</label>
                </div>
                <div class="form-group">
                    <label>Link de Pagamento *</label>
                    <input type="url" id="productPaymentLink" required>
                </div>
                <div class="flex gap-4 mt-8">
                    <button type="submit" class="btn-primary flex-1">Salvar</button>
                    <button type="button" onclick="closeProductModal()" class="btn-secondary flex-1">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Configuração do Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyCpi9LmOel3NXEQNLd8y8zEZxVqZzBhCso",
            projectId: "riderprime-78955",
            databaseURL: "https://riderprime-78955-default-rtdb.firebaseio.com",
            storageBucket: "riderprime-78955.appspot.com"
        };

        // Inicializar Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const storage = firebase.storage();

        let currentEditingProductId = null;
        let selectedFile = null;

        // Funções Globais
        window.openAddProductModal = function() {
            currentEditingProductId = null;
            document.getElementById('modalTitle').textContent = 'Novo Produto';
            document.getElementById('productForm').reset();
            document.getElementById('imagePreview').innerHTML = '<p class="text-gray-400">Nenhuma imagem selecionada</p>';
            document.getElementById('productImageUrl').value = '';
            selectedFile = null;
            document.getElementById('productModal').classList.add('active');
        };

        window.closeProductModal = function() {
            document.getElementById('productModal').classList.remove('active');
        };

        window.previewImage = function(event) {
            const file = event.target.files[0];
            if (file) {
                selectedFile = file;
                const reader = new FileReader();
                reader.onload = (e) => {
                    document.getElementById('imagePreview').innerHTML = `<img src="${e.target.result}">`;
                };
                reader.readAsDataURL(file);
            }
        };

        async function loadProducts() {
            showLoading(true);
            try {
                const snapshot = await db.collection('produtos').orderBy('createdAt', 'desc').get();
                const container = document.getElementById('products-container');
                container.innerHTML = '';

                if (snapshot.empty) {
                    container.innerHTML = '<p class="text-center py-8 text-gray-400">Nenhum produto encontrado.</p>';
                } else {
                    snapshot.forEach(doc => {
                        const p = doc.data();
                        const card = document.createElement('div');
                        card.className = 'product-card flex gap-6 items-center';
                        card.innerHTML = `
                            <img src="${p.imageUrl || ''}" class="w-24 h-24 object-cover rounded-lg">
                            <div class="flex-1">
                                <h3 class="text-xl font-bold">${p.title}</h3>
                                <p class="text-gray-400 text-sm">R$ ${parseFloat(p.price).toFixed(2)}</p>
                            </div>
                            <div class="flex flex-col gap-2">
                                <button onclick="editProduct('${doc.id}')" class="text-[#00d4ff] font-bold">Editar</button>
                                <button onclick="deleteProduct('${doc.id}')" class="text-red-500 font-bold">Excluir</button>
                            </div>
                        `;
                        container.appendChild(card);
                    });
                }
            } catch (e) {
                showAlert('Erro ao carregar: ' + e.message, 'error');
            }
            showLoading(false);
        }

        window.saveProduct = async function(event) {
            event.preventDefault();
            showLoading(true);
            try {
                let imageUrl = document.getElementById('productImageUrl').value;
                if (selectedFile) {
                    const ref = storage.ref(`produtos/${Date.now()}_${selectedFile.name}`);
                    await ref.put(selectedFile);
                    imageUrl = await ref.getDownloadURL();
                }

	                const data = {
                    title: document.getElementById('productTitle').value,
                    description: document.getElementById('productDescription').value,
                    price: parseFloat(document.getElementById('productPrice').value),
                    rating: parseFloat(document.getElementById('productRating').value),
                    badge: document.getElementById('productBadge').value,
                    promotion: document.getElementById('productPromotion').checked,
                    paymentLink: document.getElementById('productPaymentLink').value,
                    imageUrl: imageUrl,
                    updatedAt: new Date()
                };

                if (currentEditingProductId) {
                    await db.collection('produtos').doc(currentEditingProductId).update(data);
                } else {
                    data.createdAt = new Date();
                    await db.collection('produtos').add(data);
                }

                showAlert('Sucesso!', 'success');
                closeProductModal();
                loadProducts();
            } catch (e) {
                showAlert('Erro: ' + e.message, 'error');
            }
            showLoading(false);
        };

        window.editProduct = async function(id) {
            showLoading(true);
            try {
                const doc = await db.collection('produtos').doc(id).get();
                const p = doc.data();
                currentEditingProductId = id;
                document.getElementById('modalTitle').textContent = 'Editar Produto';
                document.getElementById('productTitle').value = p.title;
                document.getElementById('productDescription').value = p.description;
                document.getElementById('productPrice').value = p.price;
                document.getElementById('productRating').value = p.rating;
                document.getElementById('productBadge').value = p.badge;
                document.getElementById('productPromotion').checked = p.promotion;
                document.getElementById('productPaymentLink').value = p.paymentLink;
                document.getElementById('productImageUrl').value = p.imageUrl;
                document.getElementById('imagePreview').innerHTML = `<img src="${p.imageUrl}">`;
                document.getElementById('productModal').classList.add('active');
            } catch (e) {
                showAlert('Erro: ' + e.message, 'error');
            }
            showLoading(false);
        };

        window.deleteProduct = async function(id) {
            if (confirm('Deseja excluir?')) {
                showLoading(true);
                try {
                    await db.collection('produtos').doc(id).delete();
                    loadProducts();
                } catch (e) {
                    showAlert('Erro: ' + e.message, 'error');
                }
                showLoading(false);
            }
        };

        function showLoading(s) { document.getElementById('loading').classList.toggle('active', s); }
        function showAlert(m, t) {
            const a = document.getElementById('alert');
            a.textContent = m;
            a.className = `alert active alert-${t}`;
            setTimeout(() => a.classList.remove('active'), 3000);
        }

        loadProducts();
    </script>
</body>
</html>
